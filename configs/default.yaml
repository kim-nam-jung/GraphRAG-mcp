server:
  transport: "stdio"

indexer:
  tier1: [go, py, ts, tsx, js, jsx, cs, java, rs, c, cpp, cc, h, hpp]
  tier2: [rb, php, swift, kt, kts, scala, lua, dart]
  tier3: [sh, bash, sql, html, css, yaml, yml, json, toml, dockerfile, hcl, proto, md]
  exclude_dirs: [vendor, node_modules, .git, dist, build, __pycache__, bin, obj]
  exclude_files: ["*_test.go", "*.test.*", "*.spec.*", "*.min.js", "*.min.css"]
  chunk_max_lines: 50
  project_root: "."
  auto_reindex: true
  reindex_cooldown_sec: 10

embedding:
  model_path: "./models/harrier/model.onnx"
  tokenizer_path: "./models/harrier/tokenizer.json"
  quantization: "q4"
  dimension: 640
  max_tokens: 512
  query_instruction: "Instruct: Given a code search query, retrieve relevant code snippets\nQuery: "

storage:
  db_path: "./data/graph.db"
  wal_mode: true

graph:
  leiden_resolution: 1.0
  min_community_size: 3

search:
  auto_reindex: true
  reindex_cooldown_sec: 10
